<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f24" />
      <stop offset="50%" stop-color="#070a1e" />
      <stop offset="100%" stop-color="#020514" />
    </linearGradient>

    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#0000ff" />
    </linearGradient>
    
    <linearGradient id="chart-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.3" />
    </linearGradient>

    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#7f00ff" />
    </linearGradient>

    <!-- Filters for Glow Effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="glow-subtle" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Animations */
    @keyframes pulse-grid {
      0% { opacity: 0.15; }
      50% { opacity: 0.3; }
      100% { opacity: 0.15; }
    }

    @keyframes draw-line {
      to { stroke-dashoffset: 0; }
    }

    @keyframes float-particle {
      0% { transform: translateY(0px) translateX(0px); opacity: 0.2; }
      50% { transform: translateY(-10px) translateX(5px); opacity: 0.8; }
      100% { transform: translateY(-20px) translateX(-5px); opacity: 0; }
    }

    @keyframes title-glow {
      0%, 100% { text-shadow: 0 0 4px #00f2fe, 0 0 10px #00f2fe; }
      50% { text-shadow: 0 0 12px #00f2fe, 0 0 25px #00f2fe, 0 0 35px #00f2fe; }
    }

    @keyframes scanline {
      0% { transform: translateY(-350px); }
      100% { transform: translateY(350px); }
    }

    @keyframes node-pulse {
      0%, 100% { r: 4px; opacity: 0.7; }
      50% { r: 7px; opacity: 1; filter: url(#glow); }
    }

    @keyframes peak-pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px #ff007f); }
      50% { transform: scale(1.3); filter: drop-shadow(0 0 8px #ff007f); }
    }

    /* Element Classes */
    .bg { fill: url(#bg-grad); }
    .grid { stroke: #1e295d; stroke-width: 0.5; opacity: 0.2; animation: pulse-grid 8s infinite ease-in-out; }
    .title { font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 24px; fill: #ffffff; letter-spacing: 2px; }
    .subtitle { font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 11px; fill: #4facfe; letter-spacing: 5px; }
    .meta-text { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: #6b7280; letter-spacing: 1px; }
    
    .chart-line {
      stroke: url(#accent-grad);
      stroke-width: 3.5;
      fill: none;
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      animation: draw-line 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      filter: url(#glow-subtle);
    }

    .chart-area {
      fill: url(#chart-grad);
      opacity: 0.15;
      stroke: none;
      transform: translateY(0);
    }

    .particle {
      fill: #00f2fe;
      animation: float-particle 5s infinite linear;
    }

    .node {
      fill: #00f2fe;
      animation: node-pulse 3s infinite ease-in-out;
    }

    .connection-line {
      stroke: #1e295d;
      stroke-width: 1;
      stroke-dasharray: 4,4;
      opacity: 0.5;
    }

    .peak-point {
      fill: #ff007f;
      transform-origin: 485px 145px;
      animation: peak-pulse 2s infinite ease-in-out;
    }

    .scan-line {
      stroke: rgba(0, 242, 254, 0.08);
      stroke-width: 2;
      animation: scanline 6s infinite linear;
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="800" height="350" rx="12" />

  <!-- Grid Pattern -->
  <g>
    <!-- Vertical Lines -->
    <line x1="50" y1="0" x2="50" y2="350" class="grid" />
    <line x1="100" y1="0" x2="100" y2="350" class="grid" />
    <line x1="150" y1="0" x2="150" y2="350" class="grid" />
    <line x1="200" y1="0" x2="200" y2="350" class="grid" />
    <line x1="250" y1="0" x2="250" y2="350" class="grid" />
    <line x1="300" y1="0" x2="300" y2="350" class="grid" />
    <line x1="350" y1="0" x2="350" y2="350" class="grid" />
    <line x1="400" y1="0" x2="400" y2="350" class="grid" />
    <line x1="450" y1="0" x2="450" y2="350" class="grid" />
    <line x1="500" y1="0" x2="500" y2="350" class="grid" />
    <line x1="550" y1="0" x2="550" y2="350" class="grid" />
    <line x1="600" y1="0" x2="600" y2="350" class="grid" />
    <line x1="650" y1="0" x2="650" y2="350" class="grid" />
    <line x1="700" y1="0" x2="700" y2="350" class="grid" />
    <line x1="750" y1="0" x2="750" y2="350" class="grid" />
    <!-- Horizontal Lines -->
    <line x1="0" y1="50" x2="800" y2="50" class="grid" />
    <line x1="0" y1="100" x2="800" y2="100" class="grid" />
    <line x1="0" y1="150" x2="800" y2="150" class="grid" />
    <line x1="0" y1="200" x2="800" y2="200" class="grid" />
    <line x1="0" y1="250" x2="800" y2="250" class="grid" />
    <line x1="0" y1="300" x2="800" y2="300" class="grid" />
  </g>

  <!-- Scanline effect -->
  <line x1="0" y1="0" x2="800" y2="0" class="scan-line" />

  <!-- Floating Particles -->
  <circle cx="120" cy="280" r="2" class="particle" style="animation-delay: 0s; animation-duration: 4s;" />
  <circle cx="280" cy="190" r="1.5" class="particle" style="animation-delay: 1.5s; animation-duration: 6s;" />
  <circle cx="450" cy="240" r="2" class="particle" style="animation-delay: 0.8s; animation-duration: 5s;" />
  <circle cx="620" cy="160" r="1" class="particle" style="animation-delay: 2.2s; animation-duration: 7s;" />
  <circle cx="710" cy="290" r="2.5" class="particle" style="animation-delay: 0.3s; animation-duration: 4.5s;" />

  <!-- Graph Plotting Visual (representing India's population peak around 2060s) -->
  <!-- 1950 (x: 100, y: 280) -> 2024 (x: 350, y: 190) -> 2060 (x: 485, y: 145) -> 2100 (x: 700, y: 175) -->
  <path d="M 100 280 Q 250 220 350 190 T 485 145 T 700 175 L 700 310 L 100 310 Z" class="chart-area" />
  <path d="M 100 280 Q 250 220 350 190 T 485 145 T 700 175" class="chart-line" />
  
  <!-- Chart Axes & Labels -->
  <line x1="100" y1="310" x2="720" y2="310" stroke="#4b5563" stroke-width="1.5" />
  <line x1="100" y1="120" x2="100" y2="310" stroke="#4b5563" stroke-width="1.5" />
  <text x="100" y="325" class="meta-text" text-anchor="middle">1950</text>
  <text x="350" y="325" class="meta-text" text-anchor="middle">2024 (Present)</text>
  <text x="485" y="325" class="meta-text" text-anchor="middle" fill="#ff007f">2064 (Peak)</text>
  <text x="700" y="325" class="meta-text" text-anchor="middle">2100</text>
  
  <text x="90" y="285" class="meta-text" text-anchor="end">370M</text>
  <text x="90" y="195" class="meta-text" text-anchor="end">1.4B</text>
  <text x="90" y="150" class="meta-text" text-anchor="end" fill="#ff007f">1.7B</text>

  <!-- Connection Lines for Nodes -->
  <line x1="350" y1="190" x2="400" y2="90" class="connection-line" />
  <line x1="485" y1="145" x2="400" y2="90" class="connection-line" />
  <line x1="485" y1="145" x2="550" y2="80" class="connection-line" />

  <!-- Special Nodes -->
  <circle cx="350" cy="190" r="5" fill="#00f2fe" filter="url(#glow-subtle)" />
  <circle cx="485" cy="145" r="7" class="peak-point" />
  
  <!-- Neural Network Node overlay representing Machine Learning -->
  <g transform="translate(400, 90)">
    <circle cx="0" cy="0" r="4" class="node" style="animation-delay: 0.2s;" />
    <text x="10" y="4" font-family="Inter" font-size="8" fill="#00f2fe" font-weight="bold">RF + Age Model</text>
  </g>
  <g transform="translate(550, 80)">
    <circle cx="0" cy="0" r="4" class="node" style="animation-delay: 0.9s;" />
    <text x="10" y="4" font-family="Inter" font-size="8" fill="#4facfe" font-weight="bold">Prophet Forecast</text>
  </g>

  <!-- Typography & Text Content -->
  <text x="50" y="55" class="title" style="animation: title-glow 4s infinite ease-in-out;">DEMOGRAPHIC RISK ASSESSMENT</text>
  <text x="50" y="80" class="title" style="font-size: 16px; opacity: 0.9; fill: #e5e7eb;">&amp; Population Forecasting of India</text>
  <text x="50" y="105" class="subtitle">DRDO — SSPL WINTER INTERNSHIP</text>

  <!-- Badges inside SVG -->
  <g transform="translate(50, 125)">
    <rect width="70" height="18" rx="4" fill="#111827" stroke="#1f2937" stroke-width="1" />
    <text x="35" y="12" font-family="Inter" font-size="8" font-weight="bold" fill="#10b981" text-anchor="middle">UN WPP 2024</text>
  </g>
  <g transform="translate(128, 125)">
    <rect width="90" height="18" rx="4" fill="#111827" stroke="#1f2937" stroke-width="1" />
    <text x="45" y="12" font-family="Inter" font-size="8" font-weight="bold" fill="#00f2fe" text-anchor="middle">Machine Learning</text>
  </g>
  <g transform="translate(226, 125)">
    <rect width="85" height="18" rx="4" fill="#111827" stroke="#1f2937" stroke-width="1" />
    <text x="42.5" y="12" font-family="Inter" font-size="8" font-weight="bold" fill="#eab308" text-anchor="middle">Risk Assessment</text>
  </g>
</svg>
